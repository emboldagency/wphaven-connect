name: WordPress Plugin Release

on:
  push:
    tags:
      # Match a semver tag (with optional v prefix)
      - "v?[0-9]+.[0-9]+.[0-9]"
      # Also match prerelease tags
      - "v?[0-9]+.[0-9]+.[0-9]-*"
  workflow_dispatch:

jobs:
  dist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up PHP with Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          # Disable Composer's github-oauth. setup-php otherwise writes the
          # Actions token (github.token, a ghs_ token) into Composer's global
          # config, which Composer 2.10 rejects as "invalid characters",
          # breaking both `composer install` and `wp package install`. Our
          # packages are public, so no auth is needed.
          github-token: ''

      - name: Set up WP-CLI
        run: |
          curl -fsSL -o wp-cli.phar https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp
          wp --info

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Make build script executable
        run: chmod +x scripts/build.sh

      - name: Install dist-archive command
        run: wp package install wp-cli/dist-archive-command:v3.1.0 --allow-root

      - name: Build distribution archive
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          # --fix rewrites file versions to match the release tag, so it only
          # makes sense on a tag push (github.ref_name is a clean semver there).
          # On branch/manual runs the ref may contain a "/", which breaks the
          # version sed, so build without rewriting versions instead.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            bash scripts/build.sh --fix
          else
            bash scripts/build.sh --dev
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/archives/*
